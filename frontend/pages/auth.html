<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | UX-Ray AI</title>

    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- GOOGLE IDENTITY SERVICES -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <!-- BACKGROUND GEOMETRIC SHAPES -->
    <div class="geometric-shape"></div>
    <div class="geometric-shape"></div>
    <div class="geometric-shape"></div>

    <section class="auth-page page-transition">

        <!-- Background image reuse -->
        <div class="auth-bg"></div>

        <div class="auth-container">

            <div class="auth-card">

                <h2 id="form-title" style="color: #f8fafc;">Welcome <span class="text-gradient">Back</span></h2>
                <p id="form-subtitle" style="color: #94a3b8; margin-bottom: 24px;">Login to continue</p>

                <form id="auth-form">

                    <div class="input-group" id="name-field">
                        <label>Full Name</label>
                        <input type="text" name="name" placeholder="Enter your name">
                    </div>

                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="Enter password" required>
                    </div>

                    <div id="error-message" class="error-message"></div>

                    <button type="submit" class="auth-btn">Login</button>

                    <div class="auth-separator">OR</div>

                    <div id="google-btn-wrapper" style="position: relative; z-index: 100;">
                        <button type="button" class="google-btn" id="google-login">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                            <span>Continue with Google</span>
                        </button>
                        <!-- Official Google button overlay (invisible but clickable) -->
                        <div id="google-official-btn" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; overflow: hidden; z-index: 10;"></div>
                    </div>

                </form>

                <p class="toggle-text">
                    Don't have an account?
                    <span id="toggle-form">Sign up</span>
                </p>

            </div>

        </div>

    </section>

    <!-- FOOTER SECTION -->
    <footer style="text-align: center; padding: 40px 20px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 40px;">
        <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
            <a href="/policies#terms" style="color: #94a3b8; text-decoration: none; font-size: 12px; opacity: 0.7;">Terms</a>
            <a href="/policies#privacy" style="color: #94a3b8; text-decoration: none; font-size: 12px; opacity: 0.7;">Privacy</a>
            <a href="/policies#shipping" style="color: #94a3b8; text-decoration: none; font-size: 12px; opacity: 0.7;">Shipping</a>
            <a href="/policies#refund" style="color: #94a3b8; text-decoration: none; font-size: 12px; opacity: 0.7;">Refunds</a>
            <a href="/policies#contact" style="color: #94a3b8; text-decoration: none; font-size: 12px; opacity: 0.7;">Contact</a>
        </div>
    </footer>

    <script src="../js/auth.js"></script>
    <script>
        // Page transition effects
        document.addEventListener('DOMContentLoaded', function() {
            // Add fade-in-up animation to sections on scroll
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('fade-in-up');
                    }
                });
            }, observerOptions);

            // Observe all sections
            document.querySelectorAll('section').forEach(section => {
                observer.observe(section);
            });
        });
    </script>
</body>
</html>

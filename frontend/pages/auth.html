<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | UX-Ray AI</title>

    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- BACKGROUND GEOMETRIC SHAPES -->
    <div class="geometric-shape"></div>
    <div class="geometric-shape"></div>
    <div class="geometric-shape"></div>

    <section class="auth-page page-transition">

        <!-- Background image reuse -->
        <div class="auth-bg"></div>

        <div class="auth-container">

            <div class="auth-card">

                <h2 id="form-title" style="color: #f8fafc;">Welcome <span class="text-gradient">Back</span></h2>
                <p id="form-subtitle" style="color: #94a3b8; margin-bottom: 24px;">Login to continue</p>

                <form id="auth-form">

                    <div class="input-group" id="name-field">
                        <label>Full Name</label>
                        <input type="text" name="name" placeholder="Enter your name">
                    </div>

                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="Enter password" required>
                    </div>

                    <div id="error-message" class="error-message"></div>

                    <button type="submit" class="auth-btn">Login</button>

                </form>

                <p class="toggle-text">
                    Don't have an account?
                    <span id="toggle-form">Sign up</span>
                </p>

            </div>

        </div>

    </section>

    <script src="../js/auth.js?v=1.2"></script>
    <script>
        // Page transition effects
        document.addEventListener('DOMContentLoaded', function() {
            // Add fade-in-up animation to sections on scroll
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('fade-in-up');
                    }
                });
            }, observerOptions);

            // Observe all sections
            document.querySelectorAll('section').forEach(section => {
                observer.observe(section);
            });
        });
    </script>
</body>
</html>
